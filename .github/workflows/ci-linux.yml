name: Linux

on: 
   workflow_call:
     inputs:
       branch_name:
         required: true
         type: string
         
jobs:
  ci:
    runs-on: ubuntu-latest
    container:
      image: jasonbelt/microkit_provers:latest
    name: HAMR-codegen
    env:
        HOME: /home/microkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: sireum/Sireum
          path: Sireum
          submodules: recursive          
      - name: Cache Java
        id: cache-java
        uses: actions/cache@v4
        with:
          path: Sireum/bin/linux/java
          key: ${{ runner.os }}-${{ hashFiles('Sireum/versions.properties') }}-java          
      - name: Cache Scala
        id: cache-scala
        uses: actions/cache@v4
        with:
          path: Sireum/bin/scala
          key: ${{ runner.os }}-${{ hashFiles('Sireum/versions.properties') }}-scala
      - name: Cache Coursier
        id: cache-coursier
        uses: actions/cache@v4
        with:
          path: cache/coursier
          key: ${{ runner.os }}-${{ hashFiles('Sireum/versions.properties') }}-coursier
      - name: Cache SMT2 solvers
        id: cache-smt2
        uses: actions/cache@v4
        with:
          path: |
            Sireum/bin/linux/cvc
            Sireum/bin/linux/.cvc.ver
            Sireum/bin/linux/cvc5
            Sireum/bin/linux/.cvc5.ver
            Sireum/bin/linux/z3
          key: ${{ runner.os }}-${{ hashFiles('Sireum/versions.properties') }}-smt2          
      - name: Cache FMIDE
        id: cache-fmide
        uses: actions/cache@v4
        with:
          path: Sireum/bin/linux/fmide
          key: ${{ runner.os }}-${{ hashFiles('Sireum/bin/install/fmide*') }}-fmide          
      - name: Test
        run: |
          export COURSIER_CACHE=$GITHUB_WORKSPACE/cache/coursier

          # see https://github.com/sireum/osate-plugin/blob/57785407d84793cf1f8d5926647e4dc75ab197a9/org.sireum.aadl.osate.cli/src/org/sireum/aadl/osate/cli/Phantom.java#L508-L517
          export CHECK_PHANTOM_HAMR_API_COMPATIBILITY=true

          # note: workflows have to have read and write permissions if the workflow pushes changes
          #       back to the repo.
          #       Settings >> General >> Actions >> General >> Workflow permissions

          git config user.name github-actions
          git config user.email github-actions@github.com

          export branch_name=${{ inputs.branch_name }}
          

          rm -rf ${PROVERS_DIR}/Sireum # remove bootstrap version
          export SIREUM_HOME=$(pwd)/Sireum
          export PATH=${SIREUM_HOME}/bin:${PATH}

          ${SIREUM_HOME}/bin/build.cmd setup
          rm -rf ${SIREUM_HOME}/.git
          rm -rf ${SIREUM_HOME}/out
          
          sireum -v
          
          ${SIREUM_HOME}/bin/install/fmide.cmd -v

          git clone --depth 1 https://github.com/santoslab/sysml-aadl-libraries.git sysml-aadl-libraries
          export SYSML_AADL_LIBRARIES=$(pwd)/sysml-aadl-libraries

          bin/build.cmd
